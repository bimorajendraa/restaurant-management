services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: restaurant_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d restaurant_db']
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - restaurant-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      DOCKER_HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:password@postgres:5432/restaurant_db?schema=public
      CLIENT_URL: http://localhost:3000
      CLIENT_DOCKER_URL: http://client:3000
      PRODUCTION: 'false'
      PRODUCTION_URL: http://localhost:4000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(''http://localhost:4000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      - restaurant-network

  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/restaurant_db?schema=public
    command: npx prisma migrate deploy
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    networks:
      - restaurant-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_ENDPOINT: http://localhost:4000
        NEXT_PUBLIC_URL: http://localhost:3000
        DOCKER_PUBLIC_API_ENDPOINT: http://server:4000
    env_file:
      - ./client/.env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_ENDPOINT: http://localhost:4000
      NEXT_PUBLIC_URL: http://localhost:3000
      DOCKER_PUBLIC_API_ENDPOINT: http://server:4000
    ports:
      - '3000:3000'
    depends_on:
      server:
        condition: service_healthy
    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge

volumes:
  postgres_data:
